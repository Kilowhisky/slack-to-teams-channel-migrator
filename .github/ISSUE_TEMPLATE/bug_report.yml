name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command run
      description: The command you ran (replace tokens/secrets with placeholders)
      render: bash
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Paste the full error output
      render: text
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: v22.0.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15, Ubuntu 24.04, Windows 11, etc.
    validations:
      required: true
